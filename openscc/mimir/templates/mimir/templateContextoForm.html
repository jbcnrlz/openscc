{% extends "mimirBase.html" %}

{% block mainContent %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-light py-3">
                    <h5 class="mb-0 fw-bold"><i class="fas fa-edit me-2 text-primary"></i> {{ titulo }}</h5>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">{{ form.titulo.label }}</label>
                            {{ form.titulo }}
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary">{{ form.texto.label }}</label>
                            {{ form.texto }}
                        </div>
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{% url 'mimir:listarTemplatesContexto' %}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary px-4">Salvar Template</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
